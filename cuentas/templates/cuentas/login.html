{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - The Barber House</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Estilos adicionales para el enlace de registro */
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .register-link a {
            color: #c5a059; /* Ajusta este color a tu variable --gold si la tienes */
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="login-panel">
        <form method="POST" class="login-form">
            {% csrf_token %}
            
            <div class="logo-container">
                <img src="{% static 'images/logo.png' %}" alt="The Barber House Logo">
            </div>

            <h2>Iniciar Sesión</h2>
            
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="password" name="contrasenia" placeholder="Contraseña*" required>
            

            
            <button type="submit">INGRESAR</button>
            
            <!-- Botón de Registro añadido -->
            <div class="register-link">
                <p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate como Cliente</a></p>
            </div>
            
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
        </form>
    </div>

    <div class="image-panel"></div>
</div>

</body>
</html>
